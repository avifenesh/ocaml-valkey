name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3.0"

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pkg-config libssl-dev libgmp-dev

      - name: Install opam deps
        run: |
          opam install . --deps-only --with-test --yes

      - name: Generate TLS dev certs
        run: bash scripts/gen-tls-certs.sh

      - name: Start Valkey
        run: |
          docker compose up -d
          # wait until server is ready
          for i in $(seq 1 30); do
            if docker compose exec -T valkey valkey-cli -p 6379 PING | grep -q PONG; then
              echo "valkey up"
              break
            fi
            sleep 1
          done

      - name: Build
        run: opam exec -- dune build

      - name: Test
        run: opam exec -- dune runtest

      - name: Stop Valkey
        if: always()
        run: docker compose down
